name: Backend Quality (Mongo)

on:
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-quality-mongo.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-quality-mongo.yml
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: backend-quality-mongo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    if: github.event_name != 'schedule'
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    defaults:
      run:
        working-directory: backend

    env:
      MONGODB_TEST_URI: mongodb://127.0.0.1:27017/bizZW_test
      MONGODB_URI: mongodb://127.0.0.1:27017/bizZW_test
      NODE_ENV: test
      RUN_MONGO_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  dependency-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
