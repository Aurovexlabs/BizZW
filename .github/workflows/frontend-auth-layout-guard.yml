name: Frontend Auth Layout Guard

on:
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/frontend-auth-layout-guard.yml
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/frontend-auth-layout-guard.yml

permissions:
  contents: read

concurrency:
  group: frontend-auth-layout-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  auth-layout-regression:
    name: Auth Split Layout Regression
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run auth split layout regression test
        run: npm run test -- src/test/auth-split-layout.test.tsx
